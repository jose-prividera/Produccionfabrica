<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Del Parque — Gestión</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --negro: #1a1a1a;
    --negro-medio: #2d2d2d;
    --blanco: #ffffff;
    --gris-fondo: #f5f5f3;
    --gris-borde: #e0e0e0;
    --gris-claro: #f0f0ee;
    --gris-texto: #888888;
    --naranja: #FF4713;
    --naranja-claro: #fff2ee;
    --rojo: #c62828;
    --rojo-claro: #ffebee;
    --verde-ok: #2e7d32;
    --verde-claro: #e8f5e9;
    --radio: 0px;
    --radio-sm: 0px;
    --sombra: 0 1px 4px rgba(0,0,0,0.08);
  }

  body {
    font-family: 'Raleway', sans-serif;
    background: var(--gris-fondo);
    color: var(--negro);
    min-height: 100vh;
    padding-bottom: 72px;
  }

  /* ── RAYAS decorativas ── */
  .rayas {
    display: flex;
    height: 8px;
    overflow: hidden;
  }
  .rayas span {
    flex: 1;
    background: var(--negro);
  }
  .rayas span:nth-child(even) {
    background: var(--blanco);
  }

  /* ── HEADER ── */
  .header {
    background: var(--negro);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    padding: 16px 16px 20px;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }
  .logo-area { display: flex; flex-direction: column; }
  .logo-nombre {
    font-size: 28px;
    font-weight: 800;
    color: var(--blanco);
    letter-spacing: -0.5px;
    line-height: 1;
    font-style: italic;
  }
  .logo-slogan {
    font-size: 10px;
    color: var(--naranja);
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 3px;
  }
  .sync-btn {
    background: var(--naranja);
    border: none;
    color: var(--blanco);
    padding: 8px 14px;
    font-size: 12px;
    font-family: 'Raleway', sans-serif;
    cursor: pointer;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sync-btn:active { opacity: 0.8; }
  .spin { display: inline-block; }
  .spinning { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .header-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 14px;
    letter-spacing: 0.3px;
  }

  /* MÉTRICAS HEADER */
  .metricas {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: rgba(255,255,255,0.1);
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 14px;
  }
  .metrica { text-align: center; padding: 0 8px; }
  .metrica + .metrica { border-left: 1px solid rgba(255,255,255,0.1); }
  .metrica-valor {
    font-size: 22px;
    font-weight: 800;
    color: var(--blanco);
    line-height: 1;
  }
  .metrica-label {
    font-size: 10px;
    color: rgba(255,255,255,0.45);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .metrica.alerta .metrica-valor { color: var(--naranja); }

  /* ── NAV TABS ── */
  .tabs {
    display: flex;
    background: var(--blanco);
    border-bottom: 2px solid var(--negro);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: none;
    padding: 13px 20px;
    font-size: 12px;
    font-weight: 700;
    color: var(--gris-texto);
    border: none;
    background: none;
    font-family: 'Raleway', sans-serif;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s;
  }
  .tab.activo {
    color: var(--negro);
    border-bottom-color: var(--naranja);
  }

  /* ── BÚSQUEDA ── */
  .busqueda-wrap { padding: 12px 16px 8px; }
  .busqueda {
    width: 100%;
    padding: 11px 16px;
    border: 2px solid var(--negro);
    background: var(--blanco);
    font-size: 14px;
    font-family: 'Raleway', sans-serif;
    color: var(--negro);
    font-weight: 600;
    outline: none;
    letter-spacing: 0.3px;
  }
  .busqueda:focus { border-color: var(--naranja); }
  .busqueda::placeholder { font-weight: 400; color: var(--gris-texto); }

  /* ── FILTROS ── */
  .filtro-row { display: flex; gap: 8px; padding: 0 16px 12px; }
  .chip {
    padding: 6px 14px;
    font-size: 11px;
    font-weight: 700;
    border: 2px solid var(--negro);
    background: var(--blanco);
    cursor: pointer;
    font-family: 'Raleway', sans-serif;
    color: var(--negro);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.1s;
  }
  .chip.activo-alerta { background: var(--naranja); border-color: var(--naranja); color: var(--blanco); }
  .chip.activo-sin { background: var(--negro); border-color: var(--negro); color: var(--blanco); }

  /* ── LISTA ── */
  .lista { padding: 0 16px; display: flex; flex-direction: column; gap: 6px; }

  .card {
    background: var(--blanco);
    border: 1.5px solid var(--gris-borde);
    border-left: 4px solid var(--negro);
    padding: 13px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .card.alerta { border-left-color: var(--naranja); background: #fffdf8; }
  .card.sin-stock { border-left-color: var(--negro); background: #fafafa; }

  .card-icono { font-size: 20px; flex-shrink: 0; }
  .card-info { flex: 1; min-width: 0; }
  .card-nombre {
    font-size: 13px;
    font-weight: 700;
    color: var(--negro);
    line-height: 1.3;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .card-cat {
    font-size: 10px;
    color: var(--gris-texto);
    margin-top: 2px;
    letter-spacing: 0.4px;
    font-weight: 600;
  }
  .card-derecha { text-align: right; flex-shrink: 0; }

  .badge {
    display: inline-block;
    padding: 3px 9px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge-ok { background: var(--negro); color: var(--blanco); }
  .badge-alerta { background: var(--naranja); color: var(--blanco); }
  .badge-sin { background: var(--gris-borde); color: var(--gris-texto); }

  .card-precio { font-size: 11px; color: var(--gris-texto); margin-top: 4px; font-weight: 600; }

  /* ── RECETAS ── */
  .receta-card {
    background: var(--blanco);
    border: 1.5px solid var(--gris-borde);
    border-left: 4px solid var(--negro);
    padding: 13px 14px;
    cursor: pointer;
  }
  .receta-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .receta-nombre {
    font-size: 13px;
    font-weight: 800;
    color: var(--negro);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .receta-base { font-size: 11px; color: var(--gris-texto); margin-top: 3px; font-weight: 600; }
  .receta-cant {
    font-size: 11px;
    color: var(--naranja);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: none;
    align-items: flex-end;
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: var(--blanco);
    width: 100%;
    max-height: 82vh;
    overflow-y: auto;
    padding-bottom: 40px;
  }
  .modal-rayas {
    display: flex;
    height: 6px;
  }
  .modal-rayas span { flex: 1; background: var(--negro); }
  .modal-rayas span:nth-child(even) { background: var(--naranja); }

  .modal-header {
    background: var(--negro);
    padding: 18px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-titulo {
    color: var(--blanco);
    font-size: 16px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex: 1;
  }
  .modal-cerrar {
    color: var(--blanco);
    background: rgba(255,255,255,0.15);
    border: none;
    width: 30px;
    height: 30px;
    font-size: 15px;
    cursor: pointer;
    font-family: 'Raleway', sans-serif;
    font-weight: 700;
  }
  .modal-base {
    margin: 14px 16px 0;
    background: var(--gris-claro);
    padding: 10px 14px;
    border-left: 3px solid var(--naranja);
  }
  .modal-base-txt { font-size: 12px; font-weight: 700; color: var(--negro); text-transform: uppercase; letter-spacing: 0.3px; }
  .modal-subtitulo {
    font-size: 10px;
    font-weight: 800;
    color: var(--gris-texto);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 16px 16px 8px;
    border-bottom: 1px solid var(--gris-borde);
  }
  .ing-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 16px;
    border-bottom: 1px solid var(--gris-claro);
  }
  .ing-nombre { font-size: 13px; color: var(--negro); font-weight: 500; }
  .ing-cant {
    font-size: 13px;
    font-weight: 800;
    color: var(--naranja);
    letter-spacing: 0.3px;
  }

  /* ── DASHBOARD ── */
  .dashboard { padding: 16px; }
  .dash-section { margin-bottom: 20px; }
  .dash-titulo {
    font-size: 10px;
    font-weight: 800;
    color: var(--gris-texto);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--negro);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .valuacion-card {
    background: var(--negro);
    padding: 20px;
    color: var(--blanco);
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .valuacion-card::after {
    content: '';
    position: absolute;
    right: -20px;
    top: -20px;
    width: 100px;
    height: 100px;
    border: 15px solid rgba(255,71,19,0.15);
    border-radius: 50%;
  }
  .valuacion-label {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
  }
  .valuacion-valor {
    font-size: 30px;
    font-weight: 900;
    color: var(--blanco);
    letter-spacing: -1px;
    margin-top: 4px;
  }
  .valuacion-acento { color: var(--naranja); }

  .dash-card {
    background: var(--blanco);
    border: 1.5px solid var(--gris-borde);
    padding: 13px 14px;
    margin-bottom: 6px;
    border-left: 4px solid var(--negro);
  }
  .dash-cat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .dash-cat-nombre {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .dash-cat-badge {
    font-size: 11px;
    font-weight: 800;
    padding: 2px 8px;
    text-transform: uppercase;
  }
  .dash-barra-wrap { height: 3px; background: var(--gris-claro); margin-top: 8px; }
  .dash-barra { height: 3px; background: var(--negro); transition: width 0.5s; }
  .dash-barra.warn { background: var(--naranja); }
  .dash-barra.danger { background: var(--rojo); }

  /* ── LOADING ── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 32px;
    gap: 16px;
  }
  .loading-spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--gris-borde);
    border-top-color: var(--naranja);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-txt {
    color: var(--gris-texto);
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── ERROR ── */
  .error-box {
    margin: 16px;
    padding: 20px;
    background: var(--blanco);
    border: 2px solid var(--negro);
    border-left: 6px solid var(--naranja);
    text-align: center;
  }
  .error-txt { color: var(--negro); font-size: 13px; line-height: 1.7; font-weight: 500; }

  /* ── CONFIG API KEY ── */
  .config-box {
    margin: 16px;
    padding: 20px;
    background: var(--blanco);
    border: 2px solid var(--negro);
    border-top: 6px solid var(--naranja);
  }
  .config-titulo {
    font-size: 14px;
    font-weight: 900;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .config-sub {
    font-size: 12px;
    color: var(--gris-texto);
    margin-bottom: 16px;
    line-height: 1.7;
    font-weight: 500;
  }
  .config-input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--negro);
    font-size: 13px;
    font-family: monospace;
    outline: none;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .config-input:focus { border-color: var(--naranja); }
  .config-btn {
    width: 100%;
    padding: 13px;
    background: var(--negro);
    color: var(--blanco);
    border: none;
    font-size: 13px;
    font-weight: 800;
    font-family: 'Raleway', sans-serif;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .config-btn:active { background: var(--naranja); }

  /* ── EMPTY ── */
  .empty {
    text-align: center;
    padding: 48px 32px;
    color: var(--gris-texto);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── NAV BOTTOM ── */
  .nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--negro);
    display: flex;
    z-index: 100;
    border-top: 3px solid var(--naranja);
  }
  .nav-btn {
    flex: 1;
    padding: 11px 8px 14px;
    border: none;
    background: none;
    font-family: 'Raleway', sans-serif;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    color: rgba(255,255,255,0.4);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: color 0.15s;
  }
  .nav-btn.activo { color: var(--blanco); }
  .nav-btn.activo .nav-icono { color: var(--naranja); }
  .nav-icono { font-size: 18px; }

  /* ── MOVIMIENTOS MP ── */
  .mp-filtros { display: flex; gap: 8px; padding: 12px 16px 8px; flex-wrap: wrap; }
  .mp-chip {
    padding: 5px 12px; font-size: 11px; font-weight: 700;
    border: 2px solid var(--negro); background: var(--blanco);
    cursor: pointer; font-family: 'Raleway', sans-serif;
    color: var(--negro); text-transform: uppercase; letter-spacing: 0.5px;
  }
  .mp-chip.activo { background: var(--negro); color: var(--blanco); }

  .mp-card {
    background: var(--blanco);
    border: 1.5px solid var(--gris-borde);
    padding: 13px 14px;
    margin-bottom: 6px;
  }
  .mp-card.ingreso { border-left: 4px solid #2e7d32; }
  .mp-card.egreso { border-left: 4px solid var(--naranja); }
  .mp-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .mp-producto { font-size: 13px; font-weight: 800; color: var(--negro); text-transform: uppercase; letter-spacing: 0.3px; flex: 1; margin-right: 8px; }
  .mp-cant {
    font-size: 13px; font-weight: 900;
    padding: 2px 8px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .mp-cant.ingreso { background: #e8f5e9; color: #2e7d32; }
  .mp-cant.egreso { background: var(--naranja-claro); color: var(--naranja); }
  .mp-meta { display: flex; flex-wrap: wrap; gap: 8px; }
  .mp-tag {
    font-size: 10px; font-weight: 600; color: var(--gris-texto);
    background: var(--gris-claro); padding: 2px 7px;
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  .mp-tag.destino { background: var(--negro); color: var(--blanco); }
  .mp-tag.vence-pronto { background: #fff3e0; color: #e65100; }
  .mp-tag.vencido { background: var(--rojo-claro); color: var(--rojo); }

  .mp-resumen {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px; padding: 12px 16px 0;
  }
  .mp-res-card {
    background: var(--blanco); border: 1.5px solid var(--gris-borde);
    padding: 12px; text-align: center;
  }
  .mp-res-card.verde { border-top: 3px solid #2e7d32; }
  .mp-res-card.naranja { border-top: 3px solid var(--naranja); }
  .mp-res-val { font-size: 20px; font-weight: 900; color: var(--negro); }
  .mp-res-lbl { font-size: 10px; color: var(--gris-texto); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  .seccion { display: none; }
  .seccion.activa { display: block; }
  .contador {
    font-size: 10px;
    color: var(--gris-texto);
    padding: 0 16px 8px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* TOGGLE SABORES/BASES */
  .toggle {
    display: flex;
    margin: 12px 16px 0;
    border: 2px solid var(--negro);
    overflow: hidden;
  }
  .toggle-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: var(--blanco);
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    font-weight: 800;
    color: var(--gris-texto);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.1s;
  }
  .toggle-btn + .toggle-btn { border-left: 2px solid var(--negro); }
  .toggle-btn.activo { background: var(--negro); color: var(--blanco); }

  /* GRID MÉTRICAS DASHBOARD */
  .metricas-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-bottom: 16px;
  }
  .metrica-card {
    background: var(--blanco);
    border: 1.5px solid var(--gris-borde);
    padding: 14px 10px;
    text-align: center;
    border-top: 3px solid var(--negro);
  }
  .metrica-card .val {
    font-size: 24px;
    font-weight: 900;
    color: var(--negro);
    line-height: 1;
  }
  .metrica-card .lbl {
    font-size: 9px;
    color: var(--gris-texto);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 700;
  }
  .metrica-card.warn .val { color: var(--naranja); }
  .metrica-card.warn { border-top-color: var(--naranja); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="rayas">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="header-inner">

// FETCH — Supabase
// ═══════════════════════════════════════
async function fetchTabla(tabla, params = '') {
  const url = `${SUPABASE_URL}/rest/v1/${tabla}?select=*${params}&limit=10000`;
  const r = await fetch(url, {
    headers: {
      'apikey':         SUPABASE_KEY,
      'Authorization':  'Bearer ' + SUPABASE_KEY,
      'Accept-Profile': SUPABASE_SCHEMA
    }
  });
  if (!r.ok) throw new Error('Error ' + r.status + ' en tabla ' + tabla);
  return await r.json();
}

async function cargarDatos() {
  try {
    const [stock, recetas, bases, ingresos, egresos] = await Promise.all([
      fetchTabla('stock_valuado'),
      fetchTabla('produccion_nuevo'),
      fetchTabla('bases_nuevo'),
      fetchTabla('ingresomp_in', '&order=fecha_ingreso.desc'),
      fetchTabla('egreso_mp_in', '&order=fecha_egreso.desc'),
    ]);
    procesarStock(stock);
    procesarRecetas(recetas, bases);
    procesarIngreso(ingresos);
    procesarEgreso(egresos);
    renderStock();
    filtrarRecetas();
    actualizarMetricas();
    document.getElementById('fecha-sync').textContent =
      'Actualizado hoy a las ' + new Date().toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    mostrarError(e.message);
  }
}

function procesarIngreso(rows) {
  todosIngresos = rows.map(r => ({
    fecha:         (r.fecha_ingreso    ||'').trim(),
    producto:      (r.producto_ingresado||'').trim(),
    marca:         (r.marca            ||'').trim(),
    presentacion:  (r.presentacion     ||'').trim(),
    cantidad:      parseFloat(r.cantidad_ingresada) || 0,
    lote:          (r.lote_n           ||'').trim(),
    vencimiento:   formatFecha(r.fecha_vencimiento),
    controlo:      (r.controlo         ||'').trim(),
    proveedor:     (r.proveedor        ||'').trim(),
    observaciones: (r.observaciones    ||'').trim(),
  })).filter(r => r.producto);
}

function procesarEgreso(rows) {
  todosEgresos = rows.map(r => ({
    fecha:         (r.fecha_egreso       ||'').trim(),
    producto:      (r.producto_entregado ||'').trim(),
    marca:         (r.marca              ||'').trim(),
    presentacion:  (r.presentacion       ||'').trim(),
    numero:        '',
    cantidad:      parseFloat(r.cantidad_enviada) || 0,
    lote:          (r.lote_n             ||'').trim(),
    vencimiento:   formatFecha(r.fecha_vencimiento),
    controlo:      (r.controlo           ||'').trim(),
    observaciones: (r.observaciones      ||'').trim(),
    destino:       (r.destino            ||'').trim(),
  })).filter(r => r.producto);
}

// Convierte yyyy-mm-dd → dd/mm/yyyy para mostrar y comparar
function formatFecha(iso) {
  if (!iso) return '';
  const s = iso.toString().trim();
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return m[3] + '/' + m[2] + '/' + m[1];
  return s;
}

function estaVencido(fechaStr) {
  if (!fechaStr) return false;
  const partes = fechaStr.split('/');
  if (partes.length < 3) return false;
  const fecha = new Date(partes[2].length === 2 ? '20' + partes[2] : partes[2], partes[1]-1, partes[0]);
  return fecha < new Date();
}

function venceProximo(fechaStr, dias = 60) {
  if (!fechaStr) return false;
  const partes = fechaStr.split('/');
  if (partes.length < 3) return false;
  const fecha = new Date(partes[2].length === 2 ? '20' + partes[2] : partes[2], partes[1]-1, partes[0]);
  const limite = new Date(); limite.setDate(limite.getDate() + dias);
  return fecha >= new Date() && fecha <= limite;
}

// ── Paginación ──────────────────────────────────────────────
const PAGE_SIZE = 60;
let paginaIngreso = 1;
let paginaEgreso  = 1;
let itemsIngresoFiltrados = [];

function cardIngreso(r) {
  const vencido = estaVencido(r.vencimiento);
  const pronto  = !vencido && venceProximo(r.vencimiento);
  const vencTag = vencido
    ? `<span class="mp-tag vencido">VENCIDO ${r.vencimiento}</span>`
    : pronto
    ? `<span class="mp-tag vence-pronto">Vence ${r.vencimiento}</span>`
    : r.vencimiento ? `<span class="mp-tag">Vence ${r.vencimiento}</span>` : '';
  return `<div class="mp-card ingreso">
    <div class="mp-header">
      <div class="mp-producto">${r.producto}</div>
      <span class="mp-cant ingreso">+${r.cantidad}</span>
    </div>
    <div class="mp-meta">
      ${r.fecha ? `<span class="mp-tag">${r.fecha}</span>` : ''}
      ${r.marca ? `<span class="mp-tag">${r.marca}</span>` : ''}
      ${r.presentacion ? `<span class="mp-tag">${r.presentacion}</span>` : ''}
      ${r.proveedor ? `<span class="mp-tag destino">${r.proveedor}</span>` : ''}
      ${r.lote ? `<span class="mp-tag">Lote: ${r.lote}</span>` : ''}
      ${vencTag}
      ${r.observaciones ? `<span class="mp-tag">${r.observaciones}</span>` : ''}
    </div>
  </div>`;
}

function cardEgreso(r) {
  const vencido = estaVencido(r.vencimiento);

  const vencTag = vencido

function renderIngreso() {
  const q = (document.getElementById('busqueda-ingreso').value||'').toLowerCase();
  itemsIngresoFiltrados = todosIngresos.slice().reverse().filter(r =>
    !q || r.producto.toLowerCase().includes(q) || r.proveedor.toLowerCase().includes(q) || r.marca.toLowerCase().includes(q)
  );
  paginaIngreso = 1;
  document.getElementById('ing-total').textContent = todosIngresos.length;
  document.getElementById('ing-productos').textContent = new Set(todosIngresos.map(r => r.producto)).size;
  document.getElementById('contador-ingreso').textContent = itemsIngresoFiltrados.length + ' registros';
  const lista = document.getElementById('lista-ingreso');
  if (!itemsIngresoFiltrados.length) { lista.innerHTML = '<div class="empty">Sin registros</div>'; return; }
  const visible = itemsIngresoFiltrados.slice(0, PAGE_SIZE);
  const hayMas  = itemsIngresoFiltrados.length > PAGE_SIZE;
  lista.innerHTML = visible.map(cardIngreso).join('') +
    (hayMas ? `<button onclick="cargarMasIngreso()" style="width:100%;padding:14px;background:var(--negro);color:var(--blanco);border:none;font-family:Raleway,sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-top:6px;">
      VER MÁS (${itemsIngresoFiltrados.length - PAGE_SIZE} restantes)

function procesarStock(rows) {
  todosProductos = rows.map(r => ({
    categoria: (r.categoria||'').trim(),
    producto:  (r.producto||'').trim(),
    cantidad:  parseFloat(r.cantidad) || 0,
    precio:    parseFloat(r.precio)   || 0,
    valuacion: parseFloat(r.valuacion)|| 0,
  })).filter(p => p.producto && p.categoria);
  todosProductos.forEach(p => {
    p.minimo = MINIMOS[p.categoria] || 1;
    p.sinStock = p.cantidad === 0;
    p.alerta = p.cantidad <= p.minimo;
    p.icono = ICONOS[p.categoria] || '📋';
  });
}

function procesarRecetas(rows, basesRows) {
  const rm = {};
  rows.forEach(r => {
    const s = (r.sabores||'').trim(); if (!s) return;
    if (!rm[s]) rm[s] = { sabor: s, base: (r.base||'').trim(), ingredientes: [], tipo: 'sabor' };
    if (r.ingrediente) rm[s].ingredientes.push({ nombre: r.ingrediente, cantidad: parseFloat(r.q_base)||0, unidad: r.um_base||'' });
  });
  const bm = {};
  basesRows.forEach(r => {
    const b = (r.ingrediente||'').trim(); if (!b) return;
    if (!bm[b]) bm[b] = { sabor: b, base: 'Base de producción', ingredientes: [], tipo: 'base' };
    if (r.q_x) bm[b].ingredientes.push({ nombre: r.q_x, cantidad: parseFloat(r.um)||0, unidad: '' });
  });
  todasRecetas = [...Object.values(rm), ...Object.values(bm)];
}

// ═══════════════════════════════════════
// RENDER STOCK
// ═══════════════════════════════════════
function renderStock() {
  const lista = document.getElementById('lista-stock');
  const q = document.getElementById('busqueda-stock').value.toLowerCase();
  const items = todosProductos.filter(p => {
    const mQ = !q || p.producto.toLowerCase().includes(q) || p.categoria.toLowerCase().includes(q);
    const mF = !filtroActivo || (filtroActivo === 'alerta' ? p.alerta : p.sinStock);
    return mQ && mF;
  });
  document.getElementById('contador-stock').textContent = items.length + ' productos encontrados';
  if (!items.length) { lista.innerHTML = '<div class="empty">Sin resultados</div>'; return; }
  lista.innerHTML = items.map(p => {
    const cls = p.sinStock ? 'sin-stock' : p.alerta ? 'alerta' : '';
    const bCls = p.sinStock ? 'badge-sin' : p.alerta ? 'badge-alerta' : 'badge-ok';
    const bTxt = p.sinStock ? 'SIN STOCK' : (p.cantidad % 1 === 0 ? p.cantidad : p.cantidad.toFixed(1));
    const precio = p.precio ? '$' + Math.round(p.precio).toLocaleString('es-AR') : '';
    return `<div class="card ${cls}">
      <div class="card-icono">${p.icono}</div>
      <div class="card-info">
        <div class="card-nombre">${p.producto}</div>
        <div class="card-cat">${p.categoria}</div>
      </div>
      <div class="card-derecha">
        <span class="badge ${bCls}">${bTxt}</span>
        ${precio ? `<div class="card-precio">${precio}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}
function filtrarStock() { renderStock(); }
function toggleFiltro(tipo) {
  filtroActivo = filtroActivo === tipo ? null : tipo;
  document.getElementById('chip-alerta').className = 'chip' + (filtroActivo === 'alerta' ? ' activo-alerta' : '');
  document.getElementById('chip-sin').className = 'chip' + (filtroActivo === 'sin' ? ' activo-sin' : '');
  renderStock();
}

// RENDER RECETAS
// ═══════════════════════════════════════
function filtrarRecetas() {
  const q = document.getElementById('busqueda-recetas').value.toLowerCase();
  const fuente = todasRecetas.filter(r => r.tipo === (modoRecetas === 'sabores' ? 'sabor' : 'base'));
  const items = fuente.filter(r => !q || r.sabor.toLowerCase().includes(q));
  window._recetasFiltradas = items;
  const lista = document.getElementById('lista-recetas');
  document.getElementById('contador-recetas').textContent = items.length + ' recetas encontradas';
  if (!items.length) { lista.innerHTML = '<div class="empty">Sin resultados</div>'; return; }
  lista.innerHTML = items.map((r, i) => `
    <div class="receta-card" onclick="abrirReceta(${i})">
      <div class="receta-header">
        <div>
          <div class="receta-nombre">${r.tipo === 'base' ? '🧪 ' : '🍦 '}${r.sabor}</div>
          <div class="receta-base">${r.base}</div>
        </div>
        <div class="receta-cant">${r.ingredientes.length} ing. →</div>
      </div>
    </div>`).join('');
}

function abrirReceta(i) {
  const r = window._recetasFiltradas[i];
  document.getElementById('modal-titulo').textContent = r.sabor;
  document.getElementById('modal-base').innerHTML = r.base !== 'Base de producción'
    ? `<div class="modal-base"><div class="modal-base-txt">Base: ${r.base}</div></div>` : '';
  document.getElementById('modal-ingredientes').innerHTML = r.ingredientes.length
    ? r.ingredientes.map(ing =>
        `<div class="ing-row">
          <span class="ing-nombre">${ing.nombre}</span>
          <span class="ing-cant">${ing.cantidad % 1 === 0 ? ing.cantidad : ing.cantidad.toFixed(1)} ${ing.unidad}</span>
        </div>`).join('')
    : '<div class="empty">Sin ingredientes cargados</div>';
  document.getElementById('modal-overlay').classList.add('visible');
}
function cerrarModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('visible');
}

// ═══════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════
function renderDashboard() {
  if (!todosProductos.length) return;
  const total = todosProductos.length;
  const sinStock = todosProductos.filter(p => p.sinStock).length;
  const conAlerta = todosProductos.filter(p => p.alerta && !p.sinStock).length;
  const valuacion = todosProductos.reduce((s, p) => s + p.valuacion, 0);
  const valStr = '$' + Math.round(valuacion).toLocaleString('es-AR');
  const cats = [...new Set(todosProductos.map(p => p.categoria))].sort();
  const catData = cats.map(c => {
    const prods = todosProductos.filter(p => p.categoria === c);
    const alertas = prods.filter(p => p.alerta).length;
    const pct = Math.round((alertas / prods.length) * 100);
    return { c, total: prods.length, alertas, pct };
  }).sort((a, b) => b.pct - a.pct);

  document.getElementById('dashboard-contenido').innerHTML = `
    <div class="valuacion-card">
      <div class="valuacion-label">Valuación total del stock</div>
      <div class="valuacion-valor">${valStr.replace('$', '<span class="valuacion-acento">$</span>')}</div>
    </div>

    <div class="dash-section">
      <div class="dash-titulo">Resumen general</div>
      <div class="metricas-grid">
        <div class="metrica-card"><div class="val">${total}</div><div class="lbl">Productos</div></div>
        <div class="metrica-card warn"><div class="val">${conAlerta}</div><div class="lbl">Alertas</div></div>
        <div class="metrica-card warn"><div class="val">${sinStock}</div><div class="lbl">Sin stock</div></div>
      </div>
    </div>

    <div class="dash-section">
      <div class="dash-titulo">Estado por categoría</div>
      ${catData.map(d => {
        const cls = d.pct > 50 ? 'danger' : d.pct > 20 ? 'warn' : '';
        const color = d.pct > 50 ? '#c62828' : d.pct > 20 ? '#FF4713' : '#1a1a1a';
        const bg = d.pct > 50 ? '#ffebee' : d.pct > 20 ? '#fff2ee' : '#f0f0ee';
        return `<div class="dash-card">
          <div class="dash-cat-row">
            <span class="dash-cat-nombre">${ICONOS[d.c]||'📋'} ${d.c}</span>
            <span class="dash-cat-badge" style="background:${bg};color:${color}">${d.alertas}/${d.total}</span>
          </div>
          <div class="dash-barra-wrap">
            <div class="dash-barra ${cls}" style="width:${d.pct}%"></div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function actualizarMetricas() {
  document.getElementById('m-total').textContent = todosProductos.length;
  document.getElementById('m-alerta').textContent = todosProductos.filter(p => p.alerta && !p.sinStock).length;
  document.getElementById('m-sin').textContent = todosProductos.filter(p => p.sinStock).length;
}

// ═══════════════════════════════════════
// SYNC / API KEY / ERROR
// ═══════════════════════════════════════
function sincronizar() {
  const icono = document.getElementById('sync-icono');
  icono.classList.add('spinning');
  cargarDatos().finally(() => icono.classList.remove('spinning'));
}

function mostrarError(msg) {
  document.getElementById('lista-stock').innerHTML = `
    <div class="error-box">
      <div class="error-txt">
        ⚠️ No se pudo conectar con Supabase.<br><br>
        <strong>${msg}</strong><br><br>
        Verificá que el schema esté expuesto y los permisos del rol anon estén configurados.
      </div>
      <button class="config-btn" style="margin-top:12px;width:100%" onclick="cargarDatos()">
        Reintentar
      </button>
    </div>`;
  document.getElementById('fecha-sync').textContent = 'Error de conexión';
}
